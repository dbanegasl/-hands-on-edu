services:
  hands-on-edu:
    build: .
    container_name: hands_on_edu
    ports:
      - "9876:8000"
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
      - ./pytest.ini:/app/pytest.ini
      - ./requirements-dev.txt:/app/requirements-dev.txt
      # models/ is baked into the image at build time — no need to mount it
    environment:
      - MOODLE_URL=${MOODLE_URL:-http://localhost}
      - MOODLE_TOKEN=${MOODLE_TOKEN:-}
      - MOODLE_COURSE_ID=${MOODLE_COURSE_ID:-}
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    # Note: webcam is captured by the browser via getUserMedia — no device passthrough needed.
    # Only add the devices section below if running OpenCV headless demos (non-web mode):
    # devices:
    #   - /dev/video0:/dev/video0
